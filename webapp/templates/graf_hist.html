{% extends "base.html" %}

{% block title %}Gráficas históricas{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Producción y Consumo Actual</h5>
                    <canvas id="chartProduccionConsumo"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Producción y Consumo diario</h5>
                    <canvas id="chartProduccionConsumoDiario"></canvas>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{{ current_day|json_script:"current-data" }}
{{ daily|json_script:"daily-data" }}

<script>
const current = JSON.parse(document.getElementById('current-data').textContent) || {
    labels: [],
    production: [],
    consumption: []
};

const daily = JSON.parse(document.getElementById('daily-data').textContent) || {
    labels: [],
    production: [],
    consumption: []
};

const ctx1 = document.getElementById('chartProduccionConsumo').getContext('2d');
const ctx2 = document.getElementById('chartProduccionConsumoDiario').getContext('2d');

new Chart(ctx1, {
    type: 'line',
    data: {
        labels: current.labels,
        datasets: [
            { label: 'Producción', data: current.production },
            { label: 'Consumo', data: current.consumption }
        ]
    }
});

new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: daily.labels,
        datasets: [
            { label: 'Producción', data: daily.production },
            { label: 'Consumo', data: daily.consumption }
        ]
    }
});
</script>
{% endblock %}
