{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficas Históricas - HELIOSLINK</title>
    <link rel="stylesheet" href="{% static 'css/base_styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
</head>

<body class="panel-body">
    {% include "navbar.html" %}

    <!-- CONTENIDO PRINCIPAL -->
    <main class="historicas-main">
        <!-- Panel superior: Tiempo de Exposición Diario -->
        <section class="historica-panel historica-panel--full">
            <h2 class="historica-panel-title">Tiempo de Exposición Diario</h2>
            <div class="historica-axes">
                <span class="historica-axis-y">hrs</span>
                <div class="historica-chart-area" id="chartExposicionDiario" data-chart="exposicion-diario">
                    <!-- Espacio para cargar gráfica después -->
                </div>
                <div class="historica-axis-x">
                    <span>Lunes</span>
                    <span>Martes</span>
                    <span>Miércoles</span>
                    <span>Jueves</span>
                </div>
            </div>
        </section>

        <!-- Panel inferior izquierdo: Producción y Consumo -->
        <section class="historica-panel">
            <h2 class="historica-panel-title">Producción y Consumo</h2>
            <div class="historica-axes">
                <span class="historica-axis-y">Watts</span>
                <div class="historica-chart-area" id="chartProduccionConsumo" data-chart="produccion-consumo">
                    <!-- Espacio para cargar gráfica después -->
                </div>
                <div class="historica-axis-x">
                    <span>6am</span>
                    <span>7am</span>
                    <span>8am</span>
                    <span>9am</span>
                    <span>10am</span>
                    <span>11am</span>
                </div>
            </div>
        </section>

        <!-- Panel inferior derecho: Producción y Consumo Diario -->
        <section class="historica-panel">
            <h2 class="historica-panel-title">Producción y Consumo Diario</h2>
            <div class="historica-axes">
                <span class="historica-axis-y">Watts</span>
                <div class="historica-chart-area" id="chartProduccionConsumoDiario" data-chart="produccion-consumo-diario">
                    <!-- Espacio para cargar gráfica después -->
                </div>
                <div class="historica-axis-x">
                    <span>Lunes</span>
                    <span>Martes</span>
                    <span>Miércoles</span>
                    <span>Jueves</span>
                </div>
            </div>
        </section>
    </main>

    <script src="panel-common.js"></script>
</body>

</html>
