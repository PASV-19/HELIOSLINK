{% load static %}

<header class="panel-header">

	<!-- LEFT -->
	<div class="header-left">
		<button class="menu-btn" id="menuBtn" aria-label="Menú">
			<span></span>
			<span></span>
			<span></span>
		</button>

        <img src="{% static 'images/logo.png' %}" alt="Logo HELIOSLINK" class="header-logo">
	</div>

	<!-- CENTER -->
	<h1 class="panel-title">
		{{ page_name }}
	</h1>

	<!-- RIGHT -->
	<div class="header-right">
		<span class="header-user">
			{{ request.user.username }}
		</span>

		<a href="" class="logout-btn">
			Logout
		</a>
	</div>

</header>


<!-- OVERLAY -->
<div class="panel-overlay" id="panelOverlay"></div>

<!-- SIDEBAR -->
<aside class="panel-sidebar" id="panelSidebar">
	<nav>
		<ul class="panel-nav">

			<li>
                <a href="{% url 'dashboard' %}">Panel Principal</a>
			</li>
			<li>
				<a href="{% url 'graf_info' %}">Gráficas e Información</a>
			</li>
			<li>
				<a href="{% url 'graf_hist' %}">Gráficas Históricas</a>
			</li>
			<li>
				<a href="{% url 'reportes' %}">Reportes</a>
			</li>
            <li>
                <a href="{% url 'user_info' %}">Información del Usuario</a>
            </li>
			<li>
				<a href="{% url 'net_info' %}">Información de Red</a>
			</li>

		</ul>
	</nav>
</aside>


<!-- SCRIPT (minimal, replaces panel-common.js logic) -->
<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("panelSidebar");
const overlay = document.getElementById("panelOverlay");

menuBtn.addEventListener("click", () => {
	sidebar.classList.toggle("is-open");
	overlay.classList.toggle("is-open");
	menuBtn.classList.toggle("is-open");
});

overlay.addEventListener("click", () => {
	sidebar.classList.remove("is-open");
	overlay.classList.remove("is-open");
	menuBtn.classList.remove("is-open");
});
</script>
